<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylecraft - Border Lab</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <!-- Tailwind V4 Browser CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <style type="text/tailwindcss">
        @theme {
            --color-neo-yellow: #FFD100;
            --color-neo-black: #000000;
            --color-neo-pink: #FF00FF;
            --color-neo-green: #00FF41;
            --color-neo-white: #FFFFFF;

            --font-heading: "Archivo Black", sans-serif;
            --font-body: "Space Mono", monospace;

            --shadow-neo: 8px 8px 0px #000000;
            --shadow-neo-sm: 4px 4px 0px #000000;
            --shadow-neo-lg: 12px 12px 0px #000000;
        }

        /* Custom details/summary style for accordions */
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen bg-neo-yellow font-body">

    <!-- Global Header -->
    <header class="sticky top-0 z-50 bg-neo-yellow border-b-3 border-neo-black shadow-neo-sm">
        <div class="container mx-auto px-4 py-8 flex flex-wrap items-center justify-between gap-4">
            <a href="index.html" class="text-3xl md:text-4xl font-heading uppercase text-neo-black shadow-white drop-shadow-[4px_4px_0px_rgba(255,255,255,1)] hover:text-neo-pink transition-colors">
                STYLECRAFT
            </a>
            <nav class="flex flex-wrap gap-2 md:gap-4">
                <a href="index.html" class="px-4 py-2 font-bold uppercase border-3 border-neo-black transition-all bg-neo-white hover:translate-x-1 hover:translate-y-1 hover:shadow-none shadow-neo-sm">
                    HOME
                </a>
                <a href="labs.html" class="px-4 py-2 font-bold uppercase border-3 border-neo-black transition-all bg-neo-white hover:translate-x-1 hover:translate-y-1 hover:shadow-none shadow-neo-sm">
                    LABS
                </a>
            </nav>
        </div>
    </header>

    <div class="p-4 md:p-8">
        <!-- Lab Header -->
        <div class="mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-4xl md:text-6xl font-heading uppercase text-neo-black drop-shadow-[4px_4px_0px_#FFFFFF]">
                BORDER & SHAPE LAB
            </h1>
            <div class="flex gap-4">
                <a href="labs.html" class="flex items-center gap-2 px-4 py-2 bg-neo-white border-3 border-neo-black shadow-neo font-bold hover:translate-x-1 hover:translate-y-1 hover:shadow-neo-sm transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    LABS
                </a>
                <button id="btn-reset" class="flex items-center gap-2 px-4 py-2 bg-neo-white border-3 border-neo-black shadow-neo font-bold hover:translate-x-1 hover:translate-y-1 hover:shadow-neo-sm transition-all cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    RESET
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Controls Sidebar -->
            <aside class="lg:col-span-3 h-fit flex flex-col gap-4">
                
                <!-- Core Border -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2" open>
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Core Border
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-sm">Border Width (All)</label><span id="borderWidth-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">4px</span></div>
                            <input type="range" id="borderWidth" min="0" max="50" value="4">
                        </div>
                        <div>
                            <label class="font-bold text-sm block mb-1">Border Style</label>
                            <select id="borderStyle" class="w-full border-3 border-neo-black p-2 bg-white font-body font-bold outline-none focus:ring-2 focus:ring-neo-pink">
                                <option value="solid">solid</option><option value="dashed">dashed</option><option value="dotted">dotted</option><option value="double">double</option><option value="groove">groove</option><option value="ridge">ridge</option><option value="inset">inset</option><option value="outset">outset</option><option value="none">none</option>
                            </select>
                        </div>
                        <div>
                            <label class="font-bold text-sm block mb-1">Border Color</label>
                            <div class="flex items-center gap-2">
                                <input type="color" id="borderColor" value="#000000" class="w-10 h-10 border-3 border-neo-black p-0 cursor-pointer">
                            </div>
                        </div>
                    </div>
                </details>

                <!-- Individual Sides -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2">
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Individual Sides
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Top</label><span id="borderTopWidth-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">4px</span></div><input type="range" id="borderTopWidth" min="0" max="50" value="4"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Right</label><span id="borderRightWidth-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">4px</span></div><input type="range" id="borderRightWidth" min="0" max="50" value="4"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Bottom</label><span id="borderBottomWidth-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">4px</span></div><input type="range" id="borderBottomWidth" min="0" max="50" value="4"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Left</label><span id="borderLeftWidth-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">4px</span></div><input type="range" id="borderLeftWidth" min="0" max="50" value="4"></div>
                    </div>
                </details>

                <!-- Border Radius -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2" open>
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Border Radius
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">All Corners</label><span id="borderRadius-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="borderRadius" min="0" max="200" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Top Left</label><span id="borderTopLeftRadius-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="borderTopLeftRadius" min="0" max="200" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Top Right</label><span id="borderTopRightRadius-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="borderTopRightRadius" min="0" max="200" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Bottom Right</label><span id="borderBottomRightRadius-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="borderBottomRightRadius" min="0" max="200" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Bottom Left</label><span id="borderBottomLeftRadius-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="borderBottomLeftRadius" min="0" max="200" value="0"></div>
                    </div>
                </details>

                <!-- Outline -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2">
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Outline
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Outline Width</label><span id="outlineWidth-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="outlineWidth" min="0" max="20" value="0"></div>
                        <div>
                            <label class="font-bold text-sm block mb-1">Outline Style</label>
                            <select id="outlineStyle" class="w-full border-3 border-neo-black p-2 bg-white font-body font-bold outline-none focus:ring-2 focus:ring-neo-pink">
                                <option value="solid">solid</option><option value="dashed">dashed</option><option value="dotted">dotted</option><option value="double">double</option><option value="none">none</option>
                            </select>
                        </div>
                        <div><label class="font-bold text-sm block mb-1">Outline Color</label><input type="color" id="outlineColor" value="#FF00FF" class="w-10 h-10 border-3 border-neo-black p-0 cursor-pointer"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Outline Offset</label><span id="outlineOffset-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="outlineOffset" min="-20" max="20" value="0"></div>
                    </div>
                </details>

                <!-- Box Shadow -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2" open>
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Box Shadow
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div class="flex items-center gap-3">
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="boxShadowInset" class="sr-only peer">
                                <div class="w-12 h-6 bg-neo-black border-2 border-neo-black peer-focus:outline-none peer-checked:bg-neo-pink peer-checked:after:translate-x-6 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-2 after:border-neo-black after:h-4 after:w-4 after:transition-all"></div>
                            </label>
                            <span class="font-bold text-sm">Inset Shadow</span>
                        </div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">X Offset</label><span id="boxShadowX-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">8px</span></div><input type="range" id="boxShadowX" min="-50" max="50" value="8"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Y Offset</label><span id="boxShadowY-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">8px</span></div><input type="range" id="boxShadowY" min="-50" max="50" value="8"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Blur</label><span id="boxShadowBlur-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="boxShadowBlur" min="0" max="50" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Spread</label><span id="boxShadowSpread-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="boxShadowSpread" min="-50" max="50" value="0"></div>
                        <div><label class="font-bold text-sm block mb-1">Shadow Color</label><input type="color" id="boxShadowColor" value="#000000" class="w-10 h-10 border-3 border-neo-black p-0 cursor-pointer"></div>
                    </div>
                </details>

                <!-- Dimensions -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2">
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Dimensions
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Width</label><span id="width-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">200px</span></div><input type="range" id="width" min="50" max="400" value="200"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Height</label><span id="height-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">200px</span></div><input type="range" id="height" min="50" max="400" value="200"></div>
                        <div><label class="font-bold text-sm block mb-1">Background Color</label><input type="color" id="backgroundColor" value="#FFD100" class="w-10 h-10 border-3 border-neo-black p-0 cursor-pointer"></div>
                    </div>
                </details>

            </aside>

            <!-- Preview -->
            <section class="lg:col-span-6 flex flex-col gap-4">
                <div class="flex-1 bg-white border-3 border-neo-black shadow-neo p-8 flex items-center justify-center min-h-[500px] relative overflow-hidden">
                    <div class="absolute inset-0 opacity-10 pointer-events-none"
                        style="background-image: radial-gradient(circle, #000 1px, transparent 1px); background-size: 20px 20px;">
                    </div>
                    <div id="preview-box" class="relative z-10 flex items-center justify-center font-bold text-2xl transition-all duration-100 ease-in-out">
                        FUNKY
                    </div>
                </div>
            </section>

            <!-- CSS Output -->
            <aside class="lg:col-span-3 h-fit">
                <div class="bg-neo-black text-white border-3 border-neo-black shadow-neo-sm overflow-hidden">
                    <div class="flex items-center justify-between p-3 border-b-3 border-white/20 bg-neo-black">
                        <div class="flex gap-2">
                            <div class="w-3 h-3 rounded-full bg-[#FF5F56]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#FFBD2E]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#27C93F]"></div>
                        </div>
                        <span class="text-xs font-bold font-body text-gray-400">CSS OUTPUT</span>
                    </div>
                    <div class="p-4 overflow-x-auto relative group bg-[#111111]">
                        <pre id="css-code" class="text-sm font-body text-green-400 m-0"></pre>
                    </div>
                </div>
            </aside>
            
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/border-lab.js"></script>
</body>
</html>
