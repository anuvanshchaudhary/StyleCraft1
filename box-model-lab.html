<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylecraft - Box Model Lab</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <!-- Tailwind V4 Browser CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <style type="text/tailwindcss">
        @theme {
            --color-neo-yellow: #FFD100;
            --color-neo-black: #000000;
            --color-neo-pink: #FF00FF;
            --color-neo-green: #00FF41;
            --color-neo-white: #FFFFFF;

            --font-heading: "Archivo Black", sans-serif;
            --font-body: "Space Mono", monospace;

            --shadow-neo: 8px 8px 0px #000000;
            --shadow-neo-sm: 4px 4px 0px #000000;
            --shadow-neo-lg: 12px 12px 0px #000000;
        }

        /* Custom details/summary style for accordions */
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen bg-neo-yellow font-body">

    <!-- Global Header -->
    <header class="sticky top-0 z-50 bg-neo-yellow border-b-3 border-neo-black shadow-neo-sm">
        <div class="container mx-auto px-4 py-8 flex flex-wrap items-center justify-between gap-4">
            <a href="index.html" class="text-3xl md:text-4xl font-heading uppercase text-neo-black shadow-white drop-shadow-[4px_4px_0px_rgba(255,255,255,1)] hover:text-neo-pink transition-colors">
                STYLECRAFT
            </a>
            <nav class="flex flex-wrap gap-2 md:gap-4">
                <a href="index.html" class="px-4 py-2 font-bold uppercase border-3 border-neo-black transition-all bg-neo-white hover:translate-x-1 hover:translate-y-1 hover:shadow-none shadow-neo-sm">
                    HOME
                </a>
                <a href="labs.html" class="px-4 py-2 font-bold uppercase border-3 border-neo-black transition-all bg-neo-white hover:translate-x-1 hover:translate-y-1 hover:shadow-none shadow-neo-sm">
                    LABS
                </a>
            </nav>
        </div>
    </header>

    <div class="p-4 md:p-8">
        <!-- Lab Header -->
        <div class="mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-4xl md:text-6xl font-heading uppercase text-neo-black drop-shadow-[4px_4px_0px_#FFFFFF]">
                BOX MODEL LAB
            </h1>
            <div class="flex gap-4">
                <a href="labs.html" class="flex items-center gap-2 px-4 py-2 bg-neo-white border-3 border-neo-black shadow-neo font-bold hover:translate-x-1 hover:translate-y-1 hover:shadow-neo-sm transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    LABS
                </a>
                <button id="btn-reset" class="flex items-center gap-2 px-4 py-2 bg-neo-white border-3 border-neo-black shadow-neo font-bold hover:translate-x-1 hover:translate-y-1 hover:shadow-neo-sm transition-all cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    RESET
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Controls Sidebar -->
            <aside class="lg:col-span-3 h-fit flex flex-col gap-4">
                
                <!-- Dimensions -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2" open>
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Dimensions
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-sm">Width</label><span id="width-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">200px</span></div>
                            <input type="range" id="width" min="50" max="600" value="200">
                        </div>
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-sm">Height</label><span id="height-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">200px</span></div>
                            <input type="range" id="height" min="50" max="600" value="200">
                        </div>
                        <div>
                            <label class="font-bold text-sm block mb-1">Box Sizing</label>
                            <select id="boxSizing" class="w-full border-3 border-neo-black p-2 bg-white font-body font-bold outline-none focus:ring-2 focus:ring-neo-pink">
                                <option value="content-box">content-box</option>
                                <option value="border-box">border-box</option>
                            </select>
                        </div>
                    </div>
                </details>

                <!-- Padding -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2" open>
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Padding
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">All</label><span id="padding-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">20px</span></div><input type="range" id="padding" min="0" max="100" value="20"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Top</label><span id="paddingTop-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">20px</span></div><input type="range" id="paddingTop" min="0" max="100" value="20"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Right</label><span id="paddingRight-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">20px</span></div><input type="range" id="paddingRight" min="0" max="100" value="20"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Bottom</label><span id="paddingBottom-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">20px</span></div><input type="range" id="paddingBottom" min="0" max="100" value="20"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Left</label><span id="paddingLeft-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">20px</span></div><input type="range" id="paddingLeft" min="0" max="100" value="20"></div>
                    </div>
                </details>

                <!-- Margin -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2">
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Margin
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">All</label><span id="margin-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="margin" min="0" max="100" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Top</label><span id="marginTop-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="marginTop" min="0" max="100" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Right</label><span id="marginRight-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="marginRight" min="0" max="100" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Bottom</label><span id="marginBottom-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="marginBottom" min="0" max="100" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Left</label><span id="marginLeft-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="marginLeft" min="0" max="100" value="0"></div>
                    </div>
                </details>

                <!-- Visualization -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2">
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Visualization
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div class="flex items-center gap-3">
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="showLabels" class="sr-only peer" checked>
                                <div class="w-12 h-6 bg-neo-black border-2 border-neo-black peer-focus:outline-none peer-checked:bg-neo-pink peer-checked:after:translate-x-6 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-2 after:border-neo-black after:h-4 after:w-4 after:transition-all"></div>
                            </label>
                            <span class="font-bold text-sm">Show Labels</span>
                        </div>
                        <div><label class="font-bold text-sm block mb-1">Element BG</label><input type="color" id="backgroundColor" value="#FFD100" class="w-10 h-10 border-3 border-neo-black p-0 cursor-pointer"></div>
                        <div><label class="font-bold text-sm block mb-1">Outer Container BG</label><input type="color" id="containerColor" value="#FFFFFF" class="w-10 h-10 border-3 border-neo-black p-0 cursor-pointer"></div>
                    </div>
                </details>

            </aside>

            <!-- Preview -->
            <section class="lg:col-span-6 flex flex-col gap-4">
                <div id="outer-container" class="flex-1 bg-white border-3 border-neo-black shadow-neo p-8 flex items-center justify-center min-h-[500px] relative overflow-hidden">
                    <div class="absolute inset-0 opacity-10 pointer-events-none"
                        style="background-image: radial-gradient(circle, #000 1px, transparent 1px); background-size: 20px 20px;">
                    </div>
                    
                    <!-- Margin Visualizer (ghost element) -->
                    <div id="margin-visualizer" class="relative bg-orange-200/50 border-2 border-dashed border-orange-500 flex items-center justify-center transition-all duration-100">
                         <!-- The actual element -->
                        <div id="preview-box" class="relative bg-neo-yellow border-3 border-neo-black flex items-center justify-center font-bold text-lg text-center overflow-hidden transition-all duration-100">
                            <!-- Inner Content (Content area visualizer) -->
                            <div id="content-visualizer" class="w-full h-full bg-blue-200/50 border-2 border-dashed border-blue-500 flex items-center justify-center">
                                <span id="box-label">CONTENT</span>
                            </div>
                            
                            <!-- Padding indicator lines? Maybe just labels -->
                            <div id="label-top" class="absolute top-2 left-1/2 -translate-x-1/2 text-[10px] font-bold bg-white px-1 border border-neo-black pointer-events-none opacity-0 transition-opacity">TOP</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- CSS Output -->
            <aside class="lg:col-span-3 h-fit">
                <div class="bg-neo-black text-white border-3 border-neo-black shadow-neo-sm overflow-hidden">
                    <div class="flex items-center justify-between p-3 border-b-3 border-white/20 bg-neo-black">
                        <div class="flex gap-2">
                            <div class="w-3 h-3 rounded-full bg-[#FF5F56]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#FFBD2E]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#27C93F]"></div>
                        </div>
                        <span class="text-xs font-bold font-body text-gray-400">CSS OUTPUT</span>
                    </div>
                    <div class="p-4 overflow-x-auto relative group bg-[#111111]">
                        <pre id="css-code" class="text-sm font-body text-green-400 m-0"></pre>
                    </div>
                </div>
            </aside>
            
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/box-model-lab.js"></script>
</body>
</html>
