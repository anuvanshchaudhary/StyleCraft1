<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylecraft - CSS Functions Lab</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <!-- Tailwind V4 Browser CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <style type="text/tailwindcss">
        @theme {
            --color-neo-yellow: #FFD100;
            --color-neo-black: #000000;
            --color-neo-pink: #FF00FF;
            --color-neo-green: #00FF41;
            --color-neo-white: #FFFFFF;

            --font-heading: "Archivo Black", sans-serif;
            --font-body: "Space Mono", monospace;

            --shadow-neo: 8px 8px 0px #000000;
            --shadow-neo-sm: 4px 4px 0px #000000;
            --shadow-neo-lg: 12px 12px 0px #000000;
        }

        /* Custom details/summary style for accordions */
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen bg-neo-yellow font-body">

    <!-- Global Header -->
    <header class="sticky top-0 z-50 bg-neo-yellow border-b-3 border-neo-black shadow-neo-sm">
        <div class="container mx-auto px-4 py-8 flex flex-wrap items-center justify-between gap-4">
            <a href="index.html" class="text-3xl md:text-4xl font-heading uppercase text-neo-black shadow-white drop-shadow-[4px_4px_0px_rgba(255,255,255,1)] hover:text-neo-pink transition-colors">
                STYLECRAFT
            </a>
            <nav class="flex flex-wrap gap-2 md:gap-4">
                <a href="index.html" class="px-4 py-2 font-bold uppercase border-3 border-neo-black transition-all bg-neo-white hover:translate-x-1 hover:translate-y-1 hover:shadow-none shadow-neo-sm">
                    HOME
                </a>
                <a href="labs.html" class="px-4 py-2 font-bold uppercase border-3 border-neo-black transition-all bg-neo-white hover:translate-x-1 hover:translate-y-1 hover:shadow-none shadow-neo-sm">
                    LABS
                </a>
            </nav>
        </div>
    </header>

    <div class="p-4 md:p-8">
        <!-- Lab Header -->
        <div class="mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-4xl md:text-6xl font-heading uppercase text-neo-black drop-shadow-[4px_4px_0px_#FFFFFF]">
                FUNCTIONS LAB
            </h1>
            <div class="flex gap-4">
                <a href="labs.html" class="flex items-center gap-2 px-4 py-2 bg-neo-white border-3 border-neo-black shadow-neo font-bold hover:translate-x-1 hover:translate-y-1 hover:shadow-neo-sm transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    LABS
                </a>
                <button id="btn-reset" class="flex items-center gap-2 px-4 py-2 bg-neo-white border-3 border-neo-black shadow-neo font-bold hover:translate-x-1 hover:translate-y-1 hover:shadow-neo-sm transition-all cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    RESET
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Controls Sidebar -->
            <aside class="lg:col-span-3 h-fit flex flex-col gap-4">
                
                <!-- Color Mix -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2" open>
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Color Mix (Box)
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div class="flex justify-between">
                            <div><label class="font-bold text-sm block mb-1">Color 1</label><input type="color" id="mixColor1" value="#FF00FF" class="w-12 h-12 border-3 border-neo-black p-0 cursor-pointer"></div>
                            <div><label class="font-bold text-sm block mb-1">Color 2</label><input type="color" id="mixColor2" value="#00FF41" class="w-12 h-12 border-3 border-neo-black p-0 cursor-pointer"></div>
                        </div>
                        <div>
                            <label class="font-bold text-sm block mb-1">Color Space</label>
                            <select id="colorSpace" class="w-full border-3 border-neo-black p-2 bg-white font-body font-bold outline-none focus:ring-2 focus:ring-neo-pink">
                                <option value="srgb">srgb</option>
                                <option value="lab">lab</option>
                                <option value="lch">lch</option>
                                <option value="oklab">oklab</option>
                                <option value="oklch">oklch</option>
                            </select>
                        </div>
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-sm">Mix Ratio (%)</label><span id="mixPercent-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">50%</span></div>
                            <input type="range" id="mixPercent" min="0" max="100" value="50">
                        </div>
                    </div>
                </details>

                <!-- Gradient -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2" open>
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Gradient (Bg)
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div>
                            <label class="font-bold text-sm block mb-1">Type</label>
                            <select id="gradType" class="w-full border-3 border-neo-black p-2 bg-white font-body font-bold outline-none focus:ring-2 focus:ring-neo-pink">
                                <option value="linear-gradient">Linear</option>
                                <option value="radial-gradient">Radial</option>
                                <option value="conic-gradient">Conic</option>
                            </select>
                        </div>
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-sm">Angle/Rotate</label><span id="gradAngle-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">90deg</span></div>
                            <input type="range" id="gradAngle" min="0" max="360" value="90">
                        </div>
                        <div class="flex justify-between">
                            <div><label class="font-bold text-sm block mb-1">Start Color</label><input type="color" id="gradColor1" value="#FFD100" class="w-12 h-12 border-3 border-neo-black p-0 cursor-pointer"></div>
                            <div><label class="font-bold text-sm block mb-1">End Color</label><input type="color" id="gradColor2" value="#FF00FF" class="w-12 h-12 border-3 border-neo-black p-0 cursor-pointer"></div>
                        </div>
                    </div>
                </details>

                <!-- Blend & Opacity -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2" open>
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Blend & Opacity
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div>
                            <label class="font-bold text-sm block mb-1">Mix Blend Mode</label>
                            <select id="blendMode" class="w-full border-3 border-neo-black p-2 bg-white font-body font-bold outline-none focus:ring-2 focus:ring-neo-pink">
                                <option value="normal">normal</option>
                                <option value="multiply">multiply</option>
                                <option value="screen">screen</option>
                                <option value="overlay">overlay</option>
                                <option value="darken">darken</option>
                                <option value="lighten">lighten</option>
                                <option value="color-dodge">color-dodge</option>
                                <option value="color-burn">color-burn</option>
                                <option value="hard-light">hard-light</option>
                                <option value="soft-light">soft-light</option>
                                <option value="difference">difference</option>
                                <option value="exclusion">exclusion</option>
                                <option value="hue">hue</option>
                                <option value="saturation">saturation</option>
                                <option value="color">color</option>
                                <option value="luminosity">luminosity</option>
                            </select>
                        </div>
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-sm">Inner Box Opacity</label><span id="boxOpacity-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">1</span></div>
                            <input type="range" id="boxOpacity" min="0" max="1" step="0.05" value="1">
                        </div>
                    </div>
                </details>
            </aside>

            <!-- Preview -->
            <section class="lg:col-span-6 flex flex-col gap-4">
                <div id="preview-area" class="flex-1 bg-white border-3 border-neo-black shadow-neo p-8 flex flex-col gap-8 min-h-[500px] relative overflow-hidden">
                    <div class="absolute inset-0 opacity-10 pointer-events-none"
                        style="background-image: radial-gradient(circle, #000 1px, transparent 1px); background-size: 20px 20px;">
                    </div>
                    
                    <div class="relative z-10 w-full flex flex-col gap-8 h-full items-center justify-center">
                        
                        <!-- Gradient Container -->
                        <div id="gradient-container" class="w-full h-full min-h-[400px] border-3 border-neo-black shadow-neo-sm flex items-center justify-center p-8 transition-all duration-200">
                            <!-- Inner Box -->
                            <div id="color-mix-box" class="w-3/4 h-3/4 max-w-sm max-h-[300px] border-3 border-neo-black shadow-neo-sm flex flex-col items-center justify-center p-6 transition-all duration-200 relative overflow-hidden">
                                <h2 class="font-heading uppercase text-white drop-shadow-[2px_2px_0px_#000] text-3xl md:text-4xl text-center mix-blend-difference">
                                    BLEND ME
                                </h2>
                            </div>
                        </div>

                    </div>
                </div>
            </section>

            <!-- CSS Output -->
            <aside class="lg:col-span-3 h-fit">
                <div class="bg-neo-black text-white border-3 border-neo-black shadow-neo-sm overflow-hidden">
                    <div class="flex items-center justify-between p-3 border-b-3 border-white/20 bg-neo-black">
                        <div class="flex gap-2">
                            <div class="w-3 h-3 rounded-full bg-[#FF5F56]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#FFBD2E]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#27C93F]"></div>
                        </div>
                        <span class="text-xs font-bold font-body text-gray-400">CSS OUTPUT</span>
                    </div>
                    <div class="p-4 overflow-x-auto relative group bg-[#111111]">
                        <pre id="css-code" class="text-sm font-body text-green-400 m-0"></pre>
                    </div>
                </div>
            </aside>
            
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/functions-lab.js"></script>
</body>
</html>
