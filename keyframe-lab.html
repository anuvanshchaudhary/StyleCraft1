<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylecraft - Keyframe Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/style.css">
    <style type="text/tailwindcss">
        @theme {
            --color-neo-yellow: #FFD100;
            --color-neo-black: #000000;
            --color-neo-pink: #FF00FF;
            --color-neo-green: #00FF41;
            --color-neo-white: #FFFFFF;
            --font-heading: "Archivo Black", sans-serif;
            --font-body: "Space Mono", monospace;
            --shadow-neo: 8px 8px 0px #000000;
            --shadow-neo-sm: 4px 4px 0px #000000;
            --shadow-neo-lg: 12px 12px 0px #000000;
        }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="min-h-screen bg-neo-yellow font-body">
    <header class="sticky top-0 z-50 bg-neo-yellow border-b-3 border-neo-black shadow-neo-sm">
        <div class="container mx-auto px-4 py-8 flex flex-wrap items-center justify-between gap-4">
            <a href="index.html" class="text-3xl md:text-4xl font-heading uppercase text-neo-black shadow-white drop-shadow-[4px_4px_0px_rgba(255,255,255,1)] hover:text-neo-pink transition-colors">STYLECRAFT</a>
            <nav class="flex flex-wrap gap-2 md:gap-4">
                <a href="index.html" class="px-4 py-2 font-bold uppercase border-3 border-neo-black transition-all bg-neo-white hover:translate-x-1 hover:translate-y-1 hover:shadow-none shadow-neo-sm">HOME</a>
                <a href="labs.html" class="px-4 py-2 font-bold uppercase border-3 border-neo-black transition-all bg-neo-white hover:translate-x-1 hover:translate-y-1 hover:shadow-none shadow-neo-sm">LABS</a>
            </nav>
        </div>
    </header>
    <div class="p-4 md:p-8">
        <div class="mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-4xl md:text-6xl font-heading uppercase text-neo-black drop-shadow-[4px_4px_0px_#FFFFFF]">KEYFRAME STUDIO</h1>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <aside class="lg:col-span-3 h-fit flex flex-col gap-4">
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2" open>
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Configuration
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-sm">Duration (s)</label><span id="duration-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">2</span></div>
                            <input type="range" id="duration" min="0.1" max="10" step="0.1" value="2">
                        </div>
                        <div>
                            <label class="font-bold text-sm block mb-1">Timing Function</label>
                            <select id="timingFunction" class="w-full border-3 border-neo-black p-2 bg-white font-body font-bold outline-none focus:ring-2 focus:ring-neo-pink">
                                <option value="ease">ease</option>
                                <option value="linear">linear</option>
                                <option value="ease-in">ease-in</option>
                                <option value="ease-out">ease-out</option>
                                <option value="ease-in-out">ease-in-out</option>
                            </select>
                        </div>
                        <div>
                            <label class="font-bold text-sm block mb-1">Direction</label>
                            <select id="direction" class="w-full border-3 border-neo-black p-2 bg-white font-body font-bold outline-none focus:ring-2 focus:ring-neo-pink">
                                <option value="normal">normal</option>
                                <option value="reverse">reverse</option>
                                <option value="alternate">alternate</option>
                                <option value="alternate-reverse">alternate-reverse</option>
                            </select>
                        </div>
                    </div>
                </details>
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2" open>
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Start (0%)
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div class="flex justify-between items-center"><label class="font-bold text-sm">Color</label><input type="color" id="startColor" value="#FF00FF" class="w-12 h-8 border-3 border-neo-black p-0 cursor-pointer"></div>
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-sm">Scale</label><span id="startScale-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">1</span></div>
                            <input type="range" id="startScale" min="0" max="3" step="0.1" value="1">
                        </div>
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-sm">Rotate</label><span id="startRotate-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0</span></div>
                            <input type="range" id="startRotate" min="0" max="360" value="0">
                        </div>
                    </div>
                </details>
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2" open>
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Middle
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-sm">Offset %</label><span id="middleOffset-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">50</span></div>
                            <input type="range" id="middleOffset" min="1" max="99" value="50">
                        </div>
                        <div class="flex justify-between items-center"><label class="font-bold text-sm">Color</label><input type="color" id="middleColor" value="#00FF41" class="w-12 h-8 border-3 border-neo-black p-0 cursor-pointer"></div>
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-sm">Scale</label><span id="middleScale-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">1.5</span></div>
                            <input type="range" id="middleScale" min="0" max="3" step="0.1" value="1.5">
                        </div>
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-sm">Rotate</label><span id="middleRotate-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">180</span></div>
                            <input type="range" id="middleRotate" min="0" max="360" value="180">
                        </div>
                    </div>
                </details>
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2" open>
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        End (100%)
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div class="flex justify-between items-center"><label class="font-bold text-sm">Color</label><input type="color" id="endColor" value="#FFD100" class="w-12 h-8 border-3 border-neo-black p-0 cursor-pointer"></div>
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-sm">Scale</label><span id="endScale-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0.1</span></div>
                            <input type="range" id="endScale" min="0" max="3" step="0.1" value="0.1">
                        </div>
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-sm">Rotate</label><span id="endRotate-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">360</span></div>
                            <input type="range" id="endRotate" min="0" max="360" value="360">
                        </div>
                    </div>
                </details>
            </aside>
            <section class="lg:col-span-6 flex flex-col gap-4">
                <style id="dynamic-keyframes"></style>
                <div class="flex-1 bg-white border-3 border-neo-black shadow-neo p-8 flex items-center justify-center min-h-[600px] relative overflow-hidden">
                    <div id="preview-box" class="w-48 h-48 border-3 border-neo-black shadow-neo flex items-center justify-center text-4xl" style="animation: funky-bounce 2s ease-in-out infinite alternate both;">
                        🦄
                    </div>
                </div>
            </section>
            <aside class="lg:col-span-3 h-fit">
                <div class="bg-neo-black text-white border-3 border-neo-black shadow-neo-sm overflow-hidden">
                    <div class="flex items-center justify-between p-3 border-b-3 border-white/20 bg-neo-black">
                        <div class="flex gap-2">
                            <div class="w-3 h-3 rounded-full bg-[#FF5F56]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#FFBD2E]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#27C93F]"></div>
                        </div>
                        <span class="text-xs font-bold font-body text-gray-400">CSS OUTPUT</span>
                    </div>
                    <div class="p-4 overflow-x-auto relative group bg-[#111111]">
                        <pre id="css-code" class="text-sm font-body text-green-400 m-0"></pre>
                    </div>
                </div>
            </aside>
        </div>
    </div>
    <script src="js/keyframe-lab.js"></script>
</body>
</html>
