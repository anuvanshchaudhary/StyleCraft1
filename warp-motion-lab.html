<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylecraft - Warp & Motion Lab</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <!-- Tailwind V4 Browser CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <style type="text/tailwindcss">
        @theme {
            --color-neo-yellow: #FFD100;
            --color-neo-black: #000000;
            --color-neo-pink: #FF00FF;
            --color-neo-green: #00FF41;
            --color-neo-white: #FFFFFF;

            --font-heading: "Archivo Black", sans-serif;
            --font-body: "Space Mono", monospace;

            --shadow-neo: 8px 8px 0px #000000;
            --shadow-neo-sm: 4px 4px 0px #000000;
            --shadow-neo-lg: 12px 12px 0px #000000;
        }

        /* Custom details/summary style for accordions */
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
        .perspective-container {
            perspective: 1000px;
        }
    </style>
</head>
<body class="min-h-screen bg-neo-yellow font-body">

    <!-- Global Header -->
    <header class="sticky top-0 z-50 bg-neo-yellow border-b-3 border-neo-black shadow-neo-sm">
        <div class="container mx-auto px-4 py-8 flex flex-wrap items-center justify-between gap-4">
            <a href="index.html" class="text-3xl md:text-4xl font-heading uppercase text-neo-black shadow-white drop-shadow-[4px_4px_0px_rgba(255,255,255,1)] hover:text-neo-pink transition-colors">
                STYLECRAFT
            </a>
            <nav class="flex flex-wrap gap-2 md:gap-4">
                <a href="index.html" class="px-4 py-2 font-bold uppercase border-3 border-neo-black transition-all bg-neo-white hover:translate-x-1 hover:translate-y-1 hover:shadow-none shadow-neo-sm">
                    HOME
                </a>
                <a href="labs.html" class="px-4 py-2 font-bold uppercase border-3 border-neo-black transition-all bg-neo-white hover:translate-x-1 hover:translate-y-1 hover:shadow-none shadow-neo-sm">
                    LABS
                </a>
            </nav>
        </div>
    </header>

    <div class="p-4 md:p-8">
        <!-- Lab Header -->
        <div class="mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-4xl md:text-6xl font-heading uppercase text-neo-black drop-shadow-[4px_4px_0px_#FFFFFF]">
                WARP & MOTION LAB
            </h1>
            <div class="flex gap-4">
                <a href="labs.html" class="flex items-center gap-2 px-4 py-2 bg-neo-white border-3 border-neo-black shadow-neo font-bold hover:translate-x-1 hover:translate-y-1 hover:shadow-neo-sm transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    LABS
                </a>
                <button id="btn-reset" class="flex items-center gap-2 px-4 py-2 bg-neo-white border-3 border-neo-black shadow-neo font-bold hover:translate-x-1 hover:translate-y-1 hover:shadow-neo-sm transition-all cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    RESET
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Controls Sidebar -->
            <aside class="lg:col-span-3 h-fit flex flex-col gap-4">
                
                <!-- 2D Transforms -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2" open>
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        2D Transform
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Rotate</label><span id="rotate-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0deg</span></div><input type="range" id="rotate" min="-360" max="360" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Scale</label><span id="scale-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">1</span></div><input type="range" id="scale" min="0" max="3" step="0.1" value="1"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Skew X</label><span id="skewX-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0deg</span></div><input type="range" id="skewX" min="-90" max="90" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Translate X</label><span id="translateX-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="translateX" min="-100" max="100" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Translate Y</label><span id="translateY-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="translateY" min="-100" max="100" value="0"></div>
                    </div>
                </details>

                <!-- 3D Transforms -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2">
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        3D Transform
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Rotate X</label><span id="rotateX-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0deg</span></div><input type="range" id="rotateX" min="-180" max="180" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Rotate Y</label><span id="rotateY-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0deg</span></div><input type="range" id="rotateY" min="-180" max="180" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Perspective</label><span id="perspective-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">1000px</span></div><input type="range" id="perspective" min="100" max="2000" value="1000"></div>
                    </div>
                </details>

                <!-- Filters -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2">
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Filters
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Blur</label><span id="blur-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0px</span></div><input type="range" id="blur" min="0" max="20" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Brightness</label><span id="brightness-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">100%</span></div><input type="range" id="brightness" min="0" max="200" value="100"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Contrast</label><span id="contrast-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">100%</span></div><input type="range" id="contrast" min="0" max="200" value="100"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Grayscale</label><span id="grayscale-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0%</span></div><input type="range" id="grayscale" min="0" max="100" value="0"></div>
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Hue Rotate</label><span id="hueRotate-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0deg</span></div><input type="range" id="hueRotate" min="0" max="360" value="0"></div>
                    </div>
                </details>

                <!-- Transition -->
                <details class="bg-white border-3 border-neo-black shadow-neo mb-2" open>
                    <summary class="font-heading uppercase p-4 border-b-2 border-neo-black bg-white hover:bg-neo-yellow transition-colors cursor-pointer flex justify-between items-center text-lg">
                        Transition (Hover)
                    </summary>
                    <div class="p-4 flex flex-col gap-4">
                        <div><div class="flex justify-between mb-1"><label class="font-bold text-sm">Duration</label><span id="duration-val" class="font-bold text-sm bg-neo-black text-white px-2 py-0.5 border-2 border-neo-black">0.3s</span></div><input type="range" id="duration" min="0" max="3" step="0.1" value="0.3"></div>
                        <div>
                            <label class="font-bold text-sm block mb-1">Timing Function</label>
                            <select id="timingFunction" class="w-full border-3 border-neo-black p-2 bg-white font-body font-bold outline-none focus:ring-2 focus:ring-neo-pink">
                                <option value="ease">ease</option>
                                <option value="linear">linear</option>
                                <option value="ease-in">ease-in</option>
                                <option value="ease-out">ease-out</option>
                                <option value="ease-in-out">ease-in-out</option>
                                <option value="cubic-bezier(0.68, -0.55, 0.27, 1.55)">Spring (Cubic)</option>
                            </select>
                        </div>
                    </div>
                </details>

            </aside>

            <!-- Preview -->
            <section class="lg:col-span-6 flex flex-col gap-4">
                <div id="preview-area" class="flex-1 bg-white border-3 border-neo-black shadow-neo p-8 flex items-center justify-center min-h-[500px] relative overflow-hidden perspective-container">
                    <div class="absolute inset-0 opacity-10 pointer-events-none"
                        style="background-image: radial-gradient(circle, #000 1px, transparent 1px); background-size: 20px 20px;">
                    </div>
                    
                    <div id="preview-box" class="w-48 h-48 bg-neo-pink border-3 border-neo-black shadow-neo flex items-center justify-center font-bold text-2xl text-center p-4 transition-all hover:bg-neo-yellow active:scale-95 group cursor-pointer">
                        WARP ME
                    </div>
                </div>
            </section>

            <!-- CSS Output -->
            <aside class="lg:col-span-3 h-fit">
                <div class="bg-neo-black text-white border-3 border-neo-black shadow-neo-sm overflow-hidden">
                    <div class="flex items-center justify-between p-3 border-b-3 border-white/20 bg-neo-black">
                        <div class="flex gap-2">
                            <div class="w-3 h-3 rounded-full bg-[#FF5F56]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#FFBD2E]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#27C93F]"></div>
                        </div>
                        <span class="text-xs font-bold font-body text-gray-400">CSS OUTPUT</span>
                    </div>
                    <div class="p-4 overflow-x-auto relative group bg-[#111111]">
                        <pre id="css-code" class="text-sm font-body text-green-400 m-0"></pre>
                    </div>
                </div>
            </aside>
            
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/warp-motion-lab.js"></script>
</body>
</html>
